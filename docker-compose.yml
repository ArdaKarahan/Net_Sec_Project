version: '3.8'

networks:
  blockchain_wan:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  node1:
    build: .
    container_name: sim_node1
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.11
    environment:
      - NODE_ID=node1
      - P2P_PORT=8000
      - BLOCKCHAIN_MODE=traditional  # Options: traditional, pqc_dilithium, pqc_falcon
      - PEERS=172.20.0.12:8000,172.20.0.13:8000
    ports:
      - "8001:8080" # Mapping local port 8001 to Node 1's RPC interface
    cap_add:
      - NET_ADMIN # Grants the container permission to use network utilities if needed

  node1_exporter:
    image: prom/node-exporter:latest
    container_name: sim_node1_exporter
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.111 # Unique IP for the exporter
    ports:
      - "9101:9100" # Map to local host for direct access if needed
    depends_on:
      - node1

  node2:
    build: .
    container_name: sim_node2
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.12
    environment:
      - NODE_ID=node2
      - P2P_PORT=8000
      - BLOCKCHAIN_MODE=traditional
      - PEERS=172.20.0.11:8000,172.20.0.13:8000
    ports:
      - "8002:8080"
    cap_add:
      - NET_ADMIN

  node2_exporter:
    image: prom/node-exporter:latest
    container_name: sim_node2_exporter
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.112 # Unique IP for the exporter
    ports:
      - "9102:9100"
    depends_on:
      - node2

  node3:
    build: .
    container_name: sim_node3
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.13
    environment:
      - NODE_ID=node3
      - P2P_PORT=8000
      - BLOCKCHAIN_MODE=traditional
      - PEERS=172.20.0.11:8000,172.20.0.12:8000
    ports:
      - "8003:8080"
    cap_add:
      - NET_ADMIN

  node3_exporter:
    image: prom/node-exporter:latest
    container_name: sim_node3_exporter
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.113 # Unique IP for the exporter
    ports:
      - "9103:9100"
    depends_on:
      - node3

  prometheus:
    image: prom/prometheus:latest
    container_name: sim_prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-remote-write-receiver
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.200 # Unique IP for Prometheus
    depends_on:
      - node1_exporter
      - node2_exporter
      - node3_exporter

  grafana:
    image: grafana/grafana:latest
    container_name: sim_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3000:3000"
    networks:
      blockchain_wan:
        ipv4_address: 172.20.0.201 # Unique IP for Grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
